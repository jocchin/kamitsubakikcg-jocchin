<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>神椿TCG 確率ツール</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: linear-gradient(180deg, #0f0f1a, #1a1a2e);
  color: white;
}

.container {
  max-width: 420px;
  margin: auto;
  padding: 20px;
}

h1 {
  text-align: center;
}

.card {
  background: rgba(255,255,255,0.05);
  padding: 15px;
  border-radius: 12px;
  margin-bottom: 15px;
}

select, input {
  width: 100%;
  padding: 10px;
  margin: 8px 0;
  border-radius: 8px;
  border: none;
  background: #222;
  color: white;
}

button {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: none;
  background: #7b5cff;
  color: white;
}

.result {
  font-size: 16px;
  line-height: 1.8;
}
</style>
</head>

<body>

<div class="container">

<h1>神椿TCG artist確率</h1>

<div class="card">

<label>先手 / 後手</label>
<select id="turn">
  <option value="7">先手（7枚）</option>
  <option value="8">後手（8枚）</option>
</select>

<p>デッキ枚数：60枚（固定）</p>

<label>引きたいartist</label>
<input type="number" id="good" value="0">

<label>引きたくないartist</label>
<input type="number" id="bad" value="0">

<button onclick="calc()">計算する</button>

</div>

<div class="card result" id="result">ここに結果が出る</div>

</div>

<script>
function comb(n, r){
  if(r > n) return 0;
  let res = 1;
  for(let i=1;i<=r;i++){
    res *= (n-r+i)/i;
  }
  return res;
}

function calc(){
  let deck = 60;
  let good = +document.getElementById("good").value;
  let bad = +document.getElementById("bad").value;
  let draw = +document.getElementById("turn").value;

  let total = comb(deck, draw);

  // 1枚も引かない
  let noGood = comb(deck - good, draw) / total;

  // ちょうど1枚
  let oneGood = (comb(good,1) * comb(deck - good, draw - 1)) / total;

  // 悪い引かない
  let noBad = comb(deck - bad, draw) / total;

  // 確率
  let atLeast1 = (1 - noGood) * 100;
  let atLeast2 = (1 - noGood - oneGood) * 100;

  // ★完全に正しい理想
  let ideal =
    (comb(deck - bad, draw) - comb(deck - good - bad, draw)) 
    / total * 100;

  document.getElementById("result").innerHTML =
    "1枚以上引く確率： " + atLeast1.toFixed(2) + "%<br>" +
    "2枚以上引く確率： " + atLeast2.toFixed(2) + "%<br>" +
    "理想（良い引いて悪い引かない）： " + ideal.toFixed(2) + "%";
}
</script>

</body>
</html>

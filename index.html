<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>カード確率計算</title>
</head>
<body>

<h2>カード確率計算</h2>

デッキ枚数:
<input id="deck" value="60"><br>

手札枚数:
<input id="draw" value="7"><br>

欲しいカード（○枚）:
<input id="want" value="0"><br>

欲しくないカード（○枚）:
<input id="dont" value="0"><br>

<button onclick="calc()">計算</button>

<p id="result"></p>

<script>
function comb(n, r) {
    if (r > n || r < 0) return 0;
    let res = 1;
    for (let i = 1; i <= r; i++) {
        res *= (n - r + i) / i;
    }
    return res;
}

function calc() {
    const N = parseInt(document.getElementById("deck").value);
    const n = parseInt(document.getElementById("draw").value);
    const W = parseInt(document.getElementById("want").value);
    const D = parseInt(document.getElementById("dont").value);

    const wantHit = 1 - comb(N - W, n) / comb(N, n);
    const dontHit = 1 - comb(N - D, n) / comb(N, n);
    const neither = comb(N - W - D, n) / comb(N, n);

    document.getElementById("result").innerHTML = `
    手札 ${n}枚 の場合<br><br>
    欲しいを引く: ${(wantHit*100).toFixed(2)}%<br>
    欲しくないを引く: ${(dontHit*100).toFixed(2)}%<br>
    どっちも引かない: ${(neither*100).toFixed(2)}%
    `;
}
</script>

</body>
</html>

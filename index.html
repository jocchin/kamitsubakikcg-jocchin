<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>カード確率</title>
</head>
<body>

<h2>60枚デッキ確率</h2>

欲しいartist（60分の○）:
<input id="want" value="4"><br>

引きたくないartist（60分の○）:
<input id="dont" value="6"><br>

<button onclick="calc()">計算</button>

<p id="result"></p>

<script>
function comb(n, r) {
    if (r > n || r < 0) return 0;
    let res = 1;
    for (let i = 1; i <= r; i++) {
        res *= (n - r + i) / i;
    }
    return res;
}

function calc() {
    const N = 60;
    const W = parseInt(document.getElementById("want").value);
    const D = parseInt(document.getElementById("dont").value);

    // 先手7枚
    const want7 = 1 - comb(N - W, 7) / comb(N, 7);
    const dont7 = 1 - comb(N - D, 7) / comb(N, 7);

    // 後手8枚
    const want8 = 1 - comb(N - W, 8) / comb(N, 8);
    const dont8 = 1 - comb(N - D, 8) / comb(N, 8);

    document.getElementById("result").innerHTML = `
    【先手（7枚）】<br>
    欲しいを引く: ${(want7*100).toFixed(2)}%<br>
    引きたくないを引く: ${(dont7*100).toFixed(2)}%<br><br>

    【後手（8枚）】<br>
    欲しいを引く: ${(want8*100).toFixed(2)}%<br>
    引きたくないを引く: ${(dont8*100).toFixed(2)}%
    `;
}
</script>

</body>
</html>

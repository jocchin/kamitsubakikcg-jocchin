<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>神椿TCG 確率ツール</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@200;300&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Noto Sans JP', sans-serif;
  background: radial-gradient(circle at 20% 0%, #1a1a2e, #05050a 70%);
  color: #eee;
}

/* 粒子 */
#particles {
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
}

/* ノイズ */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  z-index: 1;
  pointer-events: none;

  background-image: 
    repeating-radial-gradient(circle, rgba(255,255,255,0.03) 1px, transparent 2px),
    repeating-linear-gradient(0deg, rgba(255,255,255,0.02) 1px, transparent 2px);

  opacity: 0.18;
}

/* UI前面 */
.container, h1, .subtitle {
  position: relative;
  z-index: 2;
}

.container {
  max-width: 420px;
  margin: auto;
  padding: 15px;
}

/* タイトル */
h1 {
  text-align: center;
  margin: 30px 0 10px;
  font-size: 24px;
  color: #d4ccff;
  letter-spacing: 2px;
  font-weight: 200;
}

.subtitle {
  text-align: center;
  font-size: 12px;
  color: #777;
  margin-bottom: 20px;
}

/* カード */
.card {
  background: rgba(255,255,255,0.04);
  border-radius: 18px;
  padding: 18px;
  margin-bottom: 16px;
  backdrop-filter: blur(12px);
  border: 1px solid rgba(255,255,255,0.08);
  box-shadow: 0 0 25px rgba(123,92,255,0.08);
}

label {
  font-size: 12px;
  color: #888;
}

select, input {
  width: 100%;
  padding: 12px;
  margin: 6px 0 14px;
  border-radius: 12px;
  border: none;
  background: rgba(255,255,255,0.08);
  color: #fff;
}

/* ボタン */
button {
  width: 100%;
  padding: 14px;
  border-radius: 14px;
  border: none;
  font-size: 15px;
  color: white;
  background: linear-gradient(90deg, #6d5cff, #a78bfa);
  box-shadow: 0 0 20px rgba(123,92,255,0.5);
}

button:active {
  transform: scale(0.96);
}

/* 結果 */
.result {
  font-size: 18px;
  line-height: 2;
}

.fade {
  animation: fadeUp 0.6s ease;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(10px);}
  to { opacity: 1; transform: translateY(0);}
}

.big {
  font-size: 24px;
  color: #a78bfa;
}
</style>
</head>

<body>

<canvas id="particles"></canvas>

<h1>KAMITSUBAKI TCG</h1>
<div class="subtitle">artist probability tool</div>

<div class="container">

<div class="card">
<label>先手 / 後手</label>
<select id="turn">
  <option value="7">先手（7枚）</option>
  <option value="8">後手（8枚）</option>
</select>

<p style="color:#777;">デッキ枚数：60枚（固定）</p>

<label>引きたいartist</label>
<input type="number" id="good" value="0">

<label>引きたくないartist</label>
<input type="number" id="bad" value="0">

<button onclick="calc()">CALCULATE</button>
</div>

<div class="card result" id="result">
結果がここに表示されます
</div>

</div>

<script>
// ===== 粒子（最強ver） =====
const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");

function resize(){
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

let particles = [];

function init(){
  particles = [];
  for(let i=0;i<60;i++){
    particles.push({
      x: Math.random()*canvas.width,
      y: Math.random()*canvas.height,
      r: Math.random()*2 + 0.5,
      vx: (Math.random()-0.5)*0.1,
      vy: -(Math.random()*0.4 + 0.1) // 上に流れる
    });
  }
}
init();

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  ctx.fillStyle = "rgba(255,255,255,0.5)";
  ctx.shadowColor = "rgba(255,255,255,0.8)";
  ctx.shadowBlur = 8;

  particles.forEach(p=>{
    p.x += p.vx;
    p.y += p.vy;

    if(p.y < 0){
      p.y = canvas.height;
      p.x = Math.random()*canvas.width;
    }

    if(p.x < 0) p.x = canvas.width;
    if(p.x > canvas.width) p.x = 0;

    ctx.beginPath();
    ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fill();
  });

  requestAnimationFrame(draw);
}
draw();

// ===== 確率 =====
function comb(n, r){
  if(r > n) return 0;
  let res = 1;
  for(let i=1;i<=r;i++){
    res *= (n-r+i)/i;
  }
  return res;
}

function calc(){
  let deck = 60;
  let good = +document.getElementById("good").value;
  let bad = +document.getElementById("bad").value;
  let draw = +document.getElementById("turn").value;

  let total = comb(deck, draw);

  let noGood = comb(deck - good, draw) / total;
  let oneGood = (comb(good,1) * comb(deck - good, draw - 1)) / total;

  let atLeast1 = (1 - noGood) * 100;
  let atLeast2 = (1 - noGood - oneGood) * 100;

  let ideal =
    (comb(deck - bad, draw) - comb(deck - good - bad, draw)) 
    / total * 100;

  document.getElementById("result").innerHTML =
    "<div class='fade'>1枚以上</div><div class='big fade'>" + atLeast1.toFixed(2) + "%</div>" +
    "<div class='fade'>2枚以上</div><div class='big fade'>" + atLeast2.toFixed(2) + "%</div>" +
    "<div class='fade'>理想</div><div class='big fade'>" + ideal.toFixed(2) + "%</div>";
}
</script>

</body>
</html>

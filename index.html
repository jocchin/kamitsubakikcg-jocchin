<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>神椿TCG シミュレーション版</title>

<style>
body { margin:0; font-family:-apple-system,BlinkMacSystemFont,sans-serif; background: radial-gradient(circle at 20% 0%, #1a1a2e,#05050a 70%); color:#eee; }
* { box-sizing:border-box; }
h1 { text-align:center; margin:30px 0 10px; font-size:24px; color:#d4ccff; letter-spacing:2px; }
.subtitle { text-align:center; font-size:12px; color:#777; margin-bottom:20px; }
.container { max-width:420px; margin:auto; padding:15px; }
.card { background:rgba(255,255,255,0.04); border-radius:18px; padding:18px; margin-bottom:16px; backdrop-filter:blur(12px); border:1px solid rgba(255,255,255,0.08); box-shadow:0 0 25px rgba(123,92,255,0.08);}
label { font-size:12px; color:#888; }
select,input { width:100%; padding:12px; margin:6px 0 14px; border-radius:12px; border:none; background:rgba(255,255,255,0.08); color:#fff; font-size:15px; outline:none;}
button { width:100%; padding:14px; border-radius:14px; border:none; font-size:15px; font-weight:bold; color:white; background:linear-gradient(90deg,#6d5cff,#a78bfa); box-shadow:0 0 20px rgba(123,92,255,0.5);}
.result { font-size:18px; line-height:2;}
.fade { animation:fadeUp 0.6s ease;}
@keyframes fadeUp { from {opacity:0; transform:translateY(10px);} to {opacity:1; transform:translateY(0);} }
.big { font-size:22px; color:#a78bfa; font-weight:bold;}
.small { font-size:13px; color:#888;}
</style>
</head>
<body>

<h1>KAMITSUBAKI TCG</h1>
<div class="subtitle">Simulation probability tool</div>

<div class="container">

<div class="card">

<label>先手 / 後手</label>
<select id="turn">
  <option value="7">先手（7枚）</option>
  <option value="8">後手（8枚）</option>
</select>

<label>引きたいartist</label>
<input type="number" id="good" value="4">

<label>引きたくないartist</label>
<input type="number" id="bad" value="10">

<button onclick="simulate()">CALCULATE</button>

</div>

<div class="card result" id="result">
結果がここに表示されます
</div>

</div>

<script>
function simulate(){
  let deckSize = 60;
  let good = +document.getElementById("good").value;
  let bad = +document.getElementById("bad").value;
  let draw = +document.getElementById("turn").value;
  let trials = 100000; // シミュレーション回数

  if(good < 0 || bad < 0 || good + bad > deckSize){
    alert("引きたい・引きたくないカード枚数が不正です");
    return;
  }

  // デッキ作成: 0=その他, 1=good, 2=bad
  let deck = [];
  for(let i=0;i<good;i++) deck.push(1);
  for(let i=0;i<bad;i++) deck.push(2);
  while(deck.length < deckSize) deck.push(0);

  let success = 0;

  for(let t=0; t<trials; t++){
    // デッキをシャッフル
    let copy = deck.slice();
    for(let i=copy.length-1;i>0;i--){
      let j=Math.floor(Math.random()* (i+1));
      [copy[i],copy[j]] = [copy[j],copy[i]];
    }
    let hand = copy.slice(0,draw);

    let goodCount = hand.filter(x=>x===1).length;
    let badCount = hand.filter(x=>x===2).length;

    if(goodCount>=1 && badCount===0) success++;
  }

  let prob = success / trials * 100;

  document.getElementById("result").innerHTML =
    "<div class='fade'>1枚以上 & bad 0枚</div><div class='big fade'>" + prob.toFixed(2) + "%</div>";
}
</script>

</body>
</html>

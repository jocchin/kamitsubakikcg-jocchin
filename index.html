<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>神椿TCG 確率ツール</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: radial-gradient(circle at top, #1a1a2e, #0a0a12);
  color: white;
}

/* タイトル */
h1 {
  text-align: center;
  font-size: 24px;
  margin: 25px 0;
  letter-spacing: 1px;
  color: #c9b6ff;
}

/* コンテナ */
.container {
  max-width: 420px;
  margin: auto;
  padding: 15px;
}

/* ガラスカード */
.card {
  background: rgba(255, 255, 255, 0.05);
  backdrop-filter: blur(10px);
  border-radius: 16px;
  padding: 18px;
  margin-bottom: 15px;
  border: 1px solid rgba(255,255,255,0.08);
}

/* ラベル */
label {
  font-size: 13px;
  color: #aaa;
}

/* 入力 */
select, input {
  width: 100%;
  padding: 12px;
  margin: 8px 0 12px 0;
  border-radius: 10px;
  border: none;
  background: rgba(255,255,255,0.08);
  color: white;
  font-size: 16px;
}

/* ボタン */
button {
  width: 100%;
  padding: 14px;
  border-radius: 12px;
  border: none;
  font-size: 16px;
  font-weight: bold;
  color: white;
  background: linear-gradient(90deg, #7b5cff, #a78bfa);
  box-shadow: 0 0 15px rgba(123,92,255,0.4);
  transition: 0.2s;
}

button:active {
  transform: scale(0.97);
}

/* 結果 */
.result {
  font-size: 17px;
  line-height: 1.9;
}

.highlight {
  color: #a78bfa;
  font-weight: bold;
}
</style>
</head>

<body>

<h1>神椿TCG artist確率</h1>

<div class="container">

<div class="card">

<label>先手 / 後手</label>
<select id="turn">
  <option value="7">先手（7枚）</option>
  <option value="8">後手（8枚）</option>
</select>

<p style="color:#888;">デッキ枚数：60枚（固定）</p>

<label>引きたいartist</label>
<input type="number" id="good" value="0">

<label>引きたくないartist</label>
<input type="number" id="bad" value="0">

<button onclick="calc()">計算する</button>

</div>

<div class="card result" id="result">
ここに結果が出る
</div>

</div>

<script>
function comb(n, r){
  if(r > n) return 0;
  let res = 1;
  for(let i=1;i<=r;i++){
    res *= (n-r+i)/i;
  }
  return res;
}

function calc(){
  let deck = 60;
  let good = +document.getElementById("good").value;
  let bad = +document.getElementById("bad").value;
  let draw = +document.getElementById("turn").value;

  let total = comb(deck, draw);

  let noGood = comb(deck - good, draw) / total;
  let oneGood = (comb(good,1) * comb(deck - good, draw - 1)) / total;

  let atLeast1 = (1 - noGood) * 100;
  let atLeast2 = (1 - noGood - oneGood) * 100;

  let ideal =
    (comb(deck - bad, draw) - comb(deck - good - bad, draw)) 
    / total * 100;

  document.getElementById("result").innerHTML =
    "<span class='highlight'>1枚以上：</span> " + atLeast1.toFixed(2) + "%<br>" +
    "<span class='highlight'>2枚以上：</span> " + atLeast2.toFixed(2) + "%<br>" +
    "<span class='highlight'>理想：</span> " + ideal.toFixed(2) + "%";
}
</script>

</body>
</html>

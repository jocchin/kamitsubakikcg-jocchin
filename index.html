<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>確率計算</title>
</head>
<body>

<h2>60枚デッキ確率</h2>

欲しいartist（60分の○）:
<input id="target" value="4"><br>

<button onclick="calc()">計算</button>

<p id="result"></p>

<script>
function comb(n, r) {
    if (r > n || r < 0) return 0;
    let res = 1;
    for (let i = 1; i <= r; i++) {
        res *= (n - r + i) / i;
    }
    return res;
}

function calc() {
    const N = 60;
    const K = parseInt(document.getElementById("target").value);

    // 先手7枚
    const p7 = 1 - comb(N - K, 7) / comb(N, 7);

    // 後手8枚
    const p8 = 1 - comb(N - K, 8) / comb(N, 8);

    document.getElementById("result").innerHTML = `
    先手（7枚）: ${(p7*100).toFixed(2)}%<br>
    後手（8枚）: ${(p8*100).toFixed(2)}%
    `;
}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>神椿TCG 事故率ツール 完全版</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: radial-gradient(circle at 20% 0%, #1a1a2e, #05050a 70%);
  color: #eee;
}
* { box-sizing: border-box; }

h1 {
  text-align:center;
  margin:30px 0 10px;
  font-size:24px;
  color:#d4ccff;
}

.subtitle {
  text-align:center;
  font-size:12px;
  color:#777;
  margin-bottom:20px;
}

.container {
  max-width:420px;
  margin:auto;
  padding:15px;
}

.card {
  background:rgba(255,255,255,0.04);
  border-radius:18px;
  padding:18px;
  margin-bottom:16px;
  backdrop-filter:blur(12px);
  border:1px solid rgba(255,255,255,0.08);
}

label {
  font-size:12px;
  color:#888;
}

select,input {
  width:100%;
  padding:12px;
  margin:6px 0 14px;
  border-radius:12px;
  border:none;
  background:rgba(255,255,255,0.08);
  color:#fff;
}

button {
  width:100%;
  padding:14px;
  border-radius:14px;
  border:none;
  font-weight:bold;
  color:white;
  background:linear-gradient(90deg,#6d5cff,#a78bfa);
}

.result {
  font-size:18px;
  line-height:2;
}

.big {
  font-size:24px;
  color:#a78bfa;
  font-weight:bold;
}
</style>
</head>

<body>

<h1>KAMITSUBAKI TCG</h1>
<div class="subtitle">事故率計算ツール（引き直し対応）</div>

<div class="container">

<div class="card">

<label>先手 / 後手</label>
<select id="turn">
  <option value="7">先手（7枚）</option>
  <option value="8">後手（8枚）</option>
</select>

<p class="small">デッキ枚数：60枚（固定）</p>

<label>アーティスト総数</label>
<input type="number" id="artist" value="20">

<label>引きたくないアーティスト（bad）</label>
<input type="number" id="bad" value="0">

<button onclick="calc()">CALCULATE</button>

</div>

<div class="card result" id="result">
結果がここに表示されます
</div>

</div>

<script>
function comb(n, r){
  if(r > n || r < 0) return 0;
  let res = 1;
  for(let i=1;i<=r;i++){
    res *= (n-r+i)/i;
  }
  return res;
}

function calc(){
  let deck = 60;
  let artist = +document.getElementById("artist").value;
  let bad = +document.getElementById("bad").value;
  let draw = +document.getElementById("turn").value;

  if(artist < 0 || bad < 0 || artist > deck || bad > artist){
    alert("入力が不正です");
    return;
  }

  let total = comb(deck, draw);

  // アーティスト0枚（引き直し対象）
  let noArtist = comb(deck - artist, draw);

  // 有効試行（アーティスト1枚以上）
  let valid = total - noArtist;

  // badを引かない
  let noBad = comb(deck - bad, draw);

  // badを引く
  let badHit = total - noBad;

  // アーティスト0枚かつbad含むケース
  let noArtist_noBad = comb(deck - artist - bad, draw);
  let onlyNoArtist = noArtist;

  // 有効な事故のみ抽出
  let accident = (badHit - (onlyNoArtist - noArtist_noBad)) / valid * 100;

  document.getElementById("result").innerHTML =
    "<div>事故率（引き直し後）</div>" +
    "<div class='big'>" + accident.toFixed(2) + "%</div>";
}
</script>

</body>
</html>

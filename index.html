<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>KAMITSUBAKI TCG PROBABILITY</title>

<style>
body {
    background: radial-gradient(circle at top, #0a0a0f, #000);
    color: #e0e0ff;
    font-family: sans-serif;
    text-align: center;
    padding: 30px;
}

h1 {
    color: #9f7bff;
    text-shadow: 0 0 10px #7a5cff;
}

.box {
    background: rgba(20,20,40,0.7);
    border: 1px solid #7a5cff;
    border-radius: 15px;
    padding: 20px;
    width: 300px;
    margin: auto;
}

input {
    width: 80px;
    padding: 8px;
    margin: 10px;
    background: #111;
    color: white;
    border-radius: 8px;
    border: none;
    text-align: center;
}

button {
    padding: 10px 20px;
    border-radius: 10px;
    border: none;
    background: linear-gradient(135deg, #7a5cff, #4bdfff);
    color: white;
    cursor: pointer;
}

.result {
    margin-top: 20px;
    line-height: 1.8;
}
</style>
</head>

<body>

<h1>KAMITSUBAKI TCG</h1>

<div class="box">
    欲しいartist（60分の○）<br>
    <input id="want" value="4"><br>

    引きたくないartist（60分の○）<br>
    <input id="dont" value="6"><br>

    <button onclick="calc()">CALCULATE</button>

    <div id="result" class="result"></div>
</div>

<script>
function comb(n, r) {
    if (r > n || r < 0) return 0;
    let res = 1;
    for (let i = 1; i <= r; i++) {
        res *= (n - r + i) / i;
    }
    return res;
}

function calc() {
    const N = 60;
    const W = parseInt(want.value);
    const D = parseInt(dont.value);

    function calcAll(n) {
        const wantHit = 1 - comb(N - W, n) / comb(N, n);
        const dontHit = 1 - comb(N - D, n) / comb(N, n);
        const neither = comb(N - W - D, n) / comb(N, n);

        return { wantHit, dontHit, neither };
    }

    const s = calcAll(7);
    const g = calcAll(8);

    result.innerHTML = `
    【先手（7枚）】<br>
    欲しいを引く: ${(s.wantHit*100).toFixed(2)}%<br>
    引きたくないを引く: ${(s.dontHit*100).toFixed(2)}%<br>
    どっちも引かない: ${(s.neither*100).toFixed(2)}%<br><br>

    【後手（8枚）】<br>
    欲しいを引く: ${(g.wantHit*100).toFixed(2)}%<br>
    引きたくないを引く: ${(g.dontHit*100).toFixed(2)}%<br>
    どっちも引かない: ${(g.neither*100).toFixed(2)}%
    `;
}
</script>

</body>
</html>

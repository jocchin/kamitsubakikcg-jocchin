<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>神椿TCG 確率ツール</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: radial-gradient(circle at 20% 0%, #1a1a2e, #05050a 70%);
  color: #eee;
}

* { box-sizing: border-box; }

h1 {
  text-align: center;
  margin: 30px 0 10px;
  font-size: 24px;
  color: #d4ccff;
  letter-spacing: 2px;
}

.subtitle {
  text-align: center;
  font-size: 12px;
  color: #777;
  margin-bottom: 20px;
}

.container {
  max-width: 420px;
  margin: auto;
  padding: 15px;
}

.card {
  background: rgba(255,255,255,0.04);
  border-radius: 18px;
  padding: 18px;
  margin-bottom: 16px;
  backdrop-filter: blur(12px);
  border: 1px solid rgba(255,255,255,0.08);
  box-shadow: 0 0 25px rgba(123,92,255,0.08);
}

label {
  font-size: 12px;
  color: #888;
}

select, input {
  width: 100%;
  padding: 12px;
  margin: 6px 0 14px;
  border-radius: 12px;
  border: none;
  background: rgba(255,255,255,0.08);
  color: #fff;
}

button {
  position: relative;
  overflow: hidden;
  width: 100%;
  padding: 14px;
  border-radius: 14px;
  border: none;
  font-size: 15px;
  color: white;
  background: linear-gradient(90deg, #6d5cff, #a78bfa);
}

button::after {
  content: "";
  position: absolute;
  top: 50%;
  left: 50%;
  width: 0;
  height: 0;
  background: rgba(255,255,255,0.4);
  border-radius: 50%;
  transform: translate(-50%, -50%);
  opacity: 0;
}

button:active::after {
  width: 220px;
  height: 220px;
  opacity: 0.2;
  transition: 0.4s;
}

button:active {
  transform: scale(0.96);
}

.result {
  font-size: 18px;
  line-height: 2;
}

.fade {
  animation: fadeUp 0.6s ease;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(10px);}
  to { opacity: 1; transform: translateY(0);}
}

.big {
  font-size: 22px;
  color: #a78bfa;
  font-weight: bold;
}

.small {
  font-size: 13px;
  color: #888;
}
</style>
</head>

<body>

<h1>KCG artist確率計算</h1>
<div class="subtitle">artist probability tool</div>

<div class="container">

<div class="card">

<label>先手 / 後手</label>
<select id="turn">
  <option value="7">先手（7枚）</option>
  <option value="8">後手（8枚）</option>
</select>

<p class="small">デッキ枚数：60枚（固定）</p>

<label>artist総数</label>
<input type="number" id="totalArtist" value="0">

<label>引きたいartist</label>
<input type="number" id="targetArtist" value="0">

<button onclick="calc()">CALCULATE</button>

</div>

<div class="card result" id="result">
結果がここに表示されます
</div>

</div>

<script>
function comb(n, r){
  if(r > n) return 0;
  let res = 1;
  for(let i=1;i<=r;i++){
    res *= (n-r+i)/i;
  }
  return res;
}

function calc(){
  let deck = 60;
  let totalA = +document.getElementById("totalArtist").value;
  let target = +document.getElementById("targetArtist").value;
  let draw = +document.getElementById("turn").value;

  let total = comb(deck, draw);

  // 1枚以上
  let noTarget = comb(deck - target, draw) / total;
  let atLeast1 = (1 - noTarget) * 100;

  // 2枚以上
  let oneTarget = (comb(target,1) * comb(deck - target, draw - 1)) / total;
  let atLeast2 = (1 - noTarget - oneTarget) * 100;

  document.getElementById("result").innerHTML =
    "<div class='fade'>引きたいartistを1枚以上</div><div class='big fade'>" + atLeast1.toFixed(2) + "%</div>" +
    "<div class='fade'>2枚以上</div><div class='big fade'>" + atLeast2.toFixed(2) + "%</div>";
}
</script>

</body>
</html>

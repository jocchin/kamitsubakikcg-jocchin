<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>神椿TCG 確率ツール 完全版</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: radial-gradient(circle at 20% 0%, #1a1a2e, #05050a 70%);
  color: #eee;
}
* { box-sizing: border-box; }

h1 { text-align:center; margin:30px 0 10px; color:#d4ccff; }
.subtitle { text-align:center; font-size:12px; color:#777; margin-bottom:20px; }

.container { max-width:420px; margin:auto; padding:15px; }

.card {
  background:rgba(255,255,255,0.04);
  border-radius:18px;
  padding:18px;
  margin-bottom:16px;
}

label { font-size:12px; color:#888; }

select,input {
  width:100%;
  padding:12px;
  margin:6px 0 14px;
  border-radius:12px;
  border:none;
  background:rgba(255,255,255,0.08);
  color:#fff;
}

button {
  width:100%;
  padding:14px;
  border-radius:14px;
  border:none;
  font-weight:bold;
  color:white;
  background:linear-gradient(90deg,#6d5cff,#a78bfa);
}

.result { font-size:18px; line-height:2; }

.big { font-size:22px; color:#a78bfa; font-weight:bold; }
</style>
</head>

<body>

<h1>KAMITSUBAKI TCG</h1>
<div class="subtitle">確率ツール（引き直し対応）</div>

<div class="container">

<div class="card">

<label>先手 / 後手</label>
<select id="turn">
  <option value="7">先手（7枚）</option>
  <option value="8">後手（8枚）</option>
</select>

<p>デッキ枚数：60枚</p>

<label>アーティスト総数</label>
<input type="number" id="artist" value="20">

<label>引きたいアーティスト（good）</label>
<input type="number" id="good" value="4">

<label>引きたくないアーティスト（bad）</label>
<input type="number" id="bad" value="0">

<button onclick="calc()">CALCULATE</button>

</div>

<div class="card result" id="result">
結果がここに表示されます
</div>

</div>

<script>
function comb(n, r){
  if(r > n || r < 0) return 0;
  let res = 1;
  for(let i=1;i<=r;i++){
    res *= (n-r+i)/i;
  }
  return res;
}

function calc(){
  let deck = 60;
  let artist = +document.getElementById("artist").value;
  let good = +document.getElementById("good").value;
  let bad = +document.getElementById("bad").value;
  let draw = +document.getElementById("turn").value;

  if(artist > deck || good > artist || bad > artist || good + bad > artist){
    alert("入力が不正です");
    return;
  }

  let total = comb(deck, draw);

  // アーティスト0枚（引き直し対象）
  let noArtist = comb(deck - artist, draw);
  let valid = total - noArtist;

  // ---------- 事故率 ----------
  let noBad = comb(deck - bad, draw);
  let badHit = total - noBad;

  let noArtist_noBad = comb(deck - artist - bad, draw);
  let accident = (badHit - (noArtist - noArtist_noBad)) / valid;

  // ---------- good確率 ----------
  let noGood = comb(deck - good, draw);
  let goodHit = total - noGood;

  let noArtist_noGood = comb(deck - artist - good, draw);
  let goodRate = (goodHit - (noArtist - noArtist_noGood)) / valid;

  // ---------- 理想（goodあり & badなし） ----------
  let goodNoBad = comb(deck - bad, draw) - comb(deck - good - bad, draw);

  let ideal = goodNoBad / valid;

  document.getElementById("result").innerHTML =
    "<div>事故率（badを引く）</div><div class='big'>" + (accident*100).toFixed(2) + "%</div>" +
    "<div>goodを引く確率</div><div class='big'>" + (goodRate*100).toFixed(2) + "%</div>" +
    "<div>理想（goodあり & badなし）</div><div class='big'>" + (ideal*100).toFixed(2) + "%</div>";
}
</script>

</body>
</html>

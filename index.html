<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>神椿TCG 確率ツール</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: radial-gradient(circle at 20% 0%, #1a1a2e, #05050a 70%);
  color: #eee;
}

* { box-sizing: border-box; }

h1 {
  text-align: center;
  margin: 30px 0 10px;
  font-size: 24px;
  color: #d4ccff;
}

.subtitle {
  text-align: center;
  font-size: 12px;
  color: #777;
  margin-bottom: 20px;
}

.container {
  max-width: 420px;
  margin: auto;
  padding: 15px;
}

.card {
  background: rgba(255,255,255,0.04);
  border-radius: 18px;
  padding: 18px;
  margin-bottom: 16px;
}

input, select {
  width: 100%;
  padding: 12px;
  margin: 6px 0 14px;
  border-radius: 12px;
  border: none;
  background: rgba(255,255,255,0.08);
  color: #fff;
}

button {
  width: 100%;
  padding: 14px;
  border-radius: 14px;
  border: none;
  color: white;
  background: linear-gradient(90deg, #6d5cff, #a78bfa);
}

.big {
  font-size: 20px;
  color: #a78bfa;
}
</style>
</head>

<body>

<h1>KCG artist確率計算</h1>
<div class="subtitle">true probability</div>

<div class="container">

<div class="card">

<label>先手 / 後手</label>
<select id="turn">
  <option value="7">先手（7枚）</option>
  <option value="8">後手（8枚）</option>
</select>

<label>artist総数</label>
<input type="number" id="totalA" value="14">

<label>引きたいartist</label>
<input type="number" id="target" value="4">

<button onclick="calc()">CALCULATE</button>

</div>

<div class="card" id="result"></div>

</div>

<script>
function comb(n, r){
  if(r > n) return 0;
  let res = 1;
  for(let i=1;i<=r;i++){
    res *= (n-r+i)/i;
  }
  return res;
}

function calc(){
  let deck = 60;
  let totalA = +document.getElementById("totalA").value;
  let target = +document.getElementById("target").value;
  let draw = +document.getElementById("turn").value;

  let otherA = totalA - target;
  let nonA = deck - totalA;

  let total = comb(deck, draw);

  let success = 0;

  // 欲しいを1枚以上 & 欲しくないartistを0枚
  for(let k=1; k<=draw; k++){ // 欲しい枚数
    let ways =
      comb(target, k) *
      comb(nonA, draw - k); // 非artistだけ引く

    success += ways;
  }

  let prob = (success / total) * 100;

  document.getElementById("result").innerHTML =
    "<div>欲しいartistを引きつつ、他のartistを引かない</div>" +
    "<div class='big'>" + prob.toFixed(2) + "%</div>";
}
</script>

</body>
</html>

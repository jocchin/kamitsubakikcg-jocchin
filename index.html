<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>カード確率（拡張版）</title>
</head>
<body>

<h2>確率計算</h2>

デッキ枚数: <input id="deck" value="60"><br>
引きたい枚数: <input id="want" value="4"><br>
引きたくない枚数: <input id="dont" value="6"><br>
引く枚数: <input id="draw" value="7"><br>

<button onclick="calc()">計算</button>

<p id="result"></p>

<script>
function comb(n, r) {
    if (r > n || r < 0) return 0;
    let res = 1;
    for (let i = 1; i <= r; i++) {
        res *= (n - r + i) / i;
    }
    return res;
}

function calc() {
    const N = parseInt(deck.value);
    const W = parseInt(want.value);
    const D = parseInt(dont.value);
    const n = parseInt(draw.value);

    // 引きたくないを0枚
    const noDont = comb(N - D, n) / comb(N, n);

    // 引きたくない0枚かつ引きたい0枚
    const noDontNoWant = comb(N - D - W, n) / comb(N, n);

    // 条件達成確率
    const good = noDont - noDontNoWant;

    result.innerHTML = `
    引きたいを1枚以上: ${(1 - comb(N-W,n)/comb(N,n) * 100).toFixed(2)}%<br>
    引きたくないを引かない: ${(noDont*100).toFixed(2)}%<br>
    両方達成: ${(good*100).toFixed(2)}%
    `;
}
</script>

</body>
</html>

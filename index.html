<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>カード確率計算</title>
</head>
<body>

<h2>60枚デッキ確率</h2>

欲しいartist（60分の○）:
<input id="want" value="4"><br>

引きたくないartist（60分の○）:
<input id="dont" value="6"><br>

<button onclick="calc()">計算</button>

<p id="result"></p>

<script>
function comb(n, r) {
    if (r > n || r < 0) return 0;
    let res = 1;
    for (let i = 1; i <= r; i++) {
        res *= (n - r + i) / i;
    }
    return res;
}

function calc() {
    const N = 60;
    const W = parseInt(document.getElementById("want").value);
    const D = parseInt(document.getElementById("dont").value);

    function calcAll(n) {
        const wantHit = 1 - comb(N - W, n) / comb(N, n);
        const dontHit = 1 - comb(N - D, n) / comb(N, n);
        const neither = comb(N - W - D, n) / comb(N, n);

        return { wantHit, dontHit, neither };
    }

    const s = calcAll(7);
    const g = calcAll(8);

    document.getElementById("result").innerHTML = `
    【先手（7枚）】<br>
    欲しいを引く: ${(s.wantHit*100).toFixed(2)}%<br>
    引きたくないを引く: ${(s.dontHit*100).toFixed(2)}%<br>
    どっちも引かない: ${(s.neither*100).toFixed(2)}%<br><br>

    【後手（8枚）】<br>
    欲しいを引く: ${(g.wantHit*100).toFixed(2)}%<br>
    引きたくないを引く: ${(g.dontHit*100).toFixed(2)}%<br>
    どっちも引かない: ${(g.neither*100).toFixed(2)}%
    `;
}
</script>

</body>
</html>

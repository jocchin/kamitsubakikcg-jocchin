<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>神椿TCG artist確率ツール</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: #0f0f1a;
  color: white;
}

.container {
  max-width: 420px;
  margin: auto;
  padding: 20px;
}

h1 {
  text-align: center;
}

.card {
  background: #1c1c2a;
  padding: 15px;
  border-radius: 12px;
  margin-bottom: 15px;
}

select, input {
  width: 100%;
  padding: 10px;
  margin: 8px 0;
  border-radius: 8px;
  border: none;
  background: #222;
  color: white;
}

button {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: none;
  background: #7b5cff;
  color: white;
}

.result {
  font-size: 16px;
  line-height: 1.8;
}
</style>
</head>

<body>

<div class="container">

<h1>神椿TCG artist確率</h1>

<div class="card">

<label>先手 / 後手</label>
<select id="turn">
  <option value="7">先手（7枚）</option>
  <option value="8">後手（8枚）</option>
</select>

<p>デッキ枚数：60枚（固定）</p>

<label>引きたいartist（複数選択OK）</label>
<select id="good" multiple size="5">
  <option value="4">花譜（4枚）</option>
  <option value="3">理芽（3枚）</option>
  <option value="2">春猿火（2枚）</option>
  <option value="2">ヰ世界情緒（2枚）</option>
  <option value="1">幸祜（1枚）</option>
</select>

<label>引きたくないartist（複数選択OK）</label>
<select id="bad" multiple size="5">
  <option value="2">被り枠A（2枚）</option>
  <option value="1">被り枠B（1枚）</option>
</select>

<button onclick="calc()">計算する</button>

</div>

<div class="card result" id="result">ここに結果が出る</div>

</div>

<script>
function comb(n, r){
  if(r > n) return 0;
  let res = 1;
  for(let i=1;i<=r;i++){
    res *= (n-r+i)/i;
  }
  return res;
}

function getSelectedTotal(id){
  let select = document.getElementById(id);
  let total = 0;
  for(let option of select.selectedOptions){
    total += Number(option.value);
  }
  return total;
}

function calc(){
  let deck = 60;
  let draw = +document.getElementById("turn").value;

  let good = getSelectedTotal("good");
  let bad = getSelectedTotal("bad");

  let total = comb(deck, draw);

  let noGood = comb(deck - good, draw) / total;
  let oneGood = (comb(good,1) * comb(deck - good, draw - 1)) / total;
  let noBad = comb(deck - bad, draw) / total;

  let atLeast1 = (1 - noGood) * 100;
  let atLeast2 = (1 - noGood - oneGood) * 100;
  let ideal = (1 - noGood) * noBad * 100;

  document.getElementById("result").innerHTML =
    "選択したartist合計：" + good + "枚<br><br>" +
    "1枚以上引く確率： " + atLeast1.toFixed(2) + "%<br>" +
    "2枚以上引く確率： " + atLeast2.toFixed(2) + "%<br>" +
    "理想（良い引いて悪い引かない）： " + ideal.toFixed(2) + "%";
}
</script>

</body>
</html>

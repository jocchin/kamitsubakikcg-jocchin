<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>神椿TCG 確率ツール</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: radial-gradient(circle at 20% 0%, #1a1a2e, #05050a 70%);
  color: #eee;
}

* { box-sizing: border-box; }

h1 {
  text-align: center;
  margin: 30px 0 10px;
  font-size: 24px;
  color: #d4ccff;
  letter-spacing: 2px;
}

.subtitle {
  text-align: center;
  font-size: 12px;
  color: #777;
  margin-bottom: 20px;
}

.container {
  max-width: 420px;
  margin: auto;
  padding: 15px;
}

.card {
  background: rgba(255,255,255,0.04);
  border-radius: 18px;
  padding: 18px;
  margin-bottom: 16px;
  backdrop-filter: blur(12px);
  border: 1px solid rgba(255,255,255,0.08);
}

label {
  font-size: 12px;
  color: #888;
}

input {
  width: 100%;
  padding: 12px;
  margin: 6px 0 14px;
  border-radius: 12px;
  border: none;
  background: rgba(255,255,255,0.08);
  color: #fff;
}

button {
  width: 100%;
  padding: 14px;
  border-radius: 14px;
  border: none;
  color: white;
  background: linear-gradient(90deg, #6d5cff, #a78bfa);
}

.result { line-height: 2; }

.big {
  font-size: 20px;
  color: #a78bfa;
}
</style>
</head>

<body>

<h1>KAMITSUBAKI TCG</h1>
<div class="subtitle">artist probability tool</div>

<div class="container">

<div class="card">

<label>先手 / 後手</label>
<select id="turn">
  <option value="7">先手（7枚）</option>
  <option value="8">後手（8枚）</option>
</select>

<label>artist総数</label>
<input type="number" id="totalA" value="0">

<label>引きたいartist枚数</label>
<input type="number" id="want" value="0">

<label>引きたくないartist枚数</label>
<input type="number" id="dont" value="0">

<button onclick="calc()">CALCULATE</button>

</div>

<div class="card result" id="result"></div>

</div>

<script>
function comb(n, r){
  if(r > n) return 0;
  let res = 1;
  for(let i=1;i<=r;i++){
    res *= (n-r+i)/i;
  }
  return res;
}

function calc(){
  let deck = 60;
  let want = +document.getElementById("want").value;
  let dont = +document.getElementById("dont").value;
  let draw = +document.getElementById("turn").value;

  let total = comb(deck, draw);

  // 引きたい
  let noWant = comb(deck - want, draw) / total;
  let wantProb = (1 - noWant) * 100;

  // 引きたくない（1枚も引かない確率）
  let noDont = comb(deck - dont, draw) / total;
  let avoidProb = noDont * 100;

  document.getElementById("result").innerHTML =
    "<div>引きたいartistを1枚以上</div><div class='big'>" + wantProb.toFixed(2) + "%</div>" +
    "<div>引きたくないartistを引かない</div><div class='big'>" + avoidProb.toFixed(2) + "%</div>";
}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>神椿TCG 確率ツール</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: linear-gradient(180deg, #0f0f1a, #1a1a2e);
  color: white;
}

.container {
  max-width: 420px;
  margin: auto;
  padding: 20px;
}

h1 {
  font-size: 22px;
  text-align: center;
  margin-bottom: 15px;
}

.card {
  background: rgba(255,255,255,0.05);
  padding: 15px;
  border-radius: 14px;
  margin-bottom: 15px;
}

label {
  font-size: 13px;
  opacity: 0.8;
}

input, select {
  width: 100%;
  padding: 12px;
  margin-top: 5px;
  margin-bottom: 10px;
  border-radius: 10px;
  border: none;
  background: #222;
  color: white;
  font-size: 16px;
}

button {
  width: 100%;
  padding: 14px;
  border-radius: 12px;
  border: none;
  background: linear-gradient(90deg, #7b5cff, #9f7bff);
  color: white;
  font-size: 16px;
}

.result {
  font-size: 16px;
  line-height: 1.8;
}

canvas {
  margin-top: 10px;
}
</style>
</head>

<body>

<div class="container">

<h1>神椿TCG artist確率</h1>

<div class="card">
  <label>先手 / 後手</label>
  <select id="turn">
    <option value="7">先手（7枚）</option>
    <option value="8">後手（8枚）</option>
  </select>

  <label>デッキ枚数</label>
  <input type="number" id="deck" value="0">

  <label>引きたいartist</label>
  <input type="number" id="good" value="0">

  <label>引きたくないartist</label>
  <input type="number" id="bad" value="0">

  <button onclick="calc()">計算する</button>
</div>

<div class="card result" id="result">ここに結果が出る</div>

<div class="card">
  <canvas id="chart"></canvas>
</div>

</div>

<script>
let chart;

function comb(n, r){
  if(r > n) return 0;
  let res = 1;
  for(let i=1;i<=r;i++){
    res *= (n-r+i)/i;
  }
  return res;
}

function calc(){
  let deck = +document.getElementById("deck").value;
  let good = +document.getElementById("good").value;
  let bad = +document.getElementById("bad").value;
  let startDraw = +document.getElementById("turn").value;

  let labels = [];
  let goodArr = [];
  let idealArr = [];

  for(let turn=0; turn<=5; turn++){
    let draw = startDraw + turn;

    let total = comb(deck, draw);
    if(total === 0) continue;

    let noGood = comb(deck - good, draw) / total;
    let noBad = comb(deck - bad, draw) / total;

    let goodProb = (1 - noGood) * 100;
    let idealProb = (1 - noGood) * noBad * 100;

    labels.push("T" + turn);
    goodArr.push(goodProb.toFixed(1));
    idealArr.push(idealProb.toFixed(1));
  }

  document.getElementById("result").innerHTML =
    "良いartistを引ける確率： " + goodArr[0] + "%<br>" +
    "理想（良い引いて悪い引かない）： " + idealArr[0] + "%";

  if(chart) chart.destroy();

  chart = new Chart(document.getElementById("chart"), {
    type: 'line',
    data: {
      labels: labels,
      datasets: [
        {
          label: '良いartist',
          data: goodArr,
          borderWidth: 2,
          tension: 0.3
        },
        {
          label: '理想',
          data: idealArr,
          borderWidth: 2,
          tension: 0.3
        }
      ]
    },
    options: {
      plugins: {
        legend: {
          labels: { color: "white" }
        }
      },
      scales: {
        x: {
          ticks: { color: "white" }
        },
        y: {
          ticks: { color: "white" }
        }
      }
    }
  });
}
</script>

</body>
</html>
